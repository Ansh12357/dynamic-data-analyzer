<!DOCTYPE html>
<html>

<head>

<title>Dynamic Data Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center mb-4">Dynamic Data Analyzer 🚀</h1>

<!-- Upload -->
<form id="uploadForm" class="mb-3">
<input type="file" name="file" required>
<button class="btn btn-primary">Upload</button>
</form>

<!-- Graph Controls -->
<div class="row mb-3">

<div class="col">
<select id="xField" class="form-control"></select>
</div>

<div class="col">
<select id="yField" class="form-control"></select>
</div>

<div class="col">
<button class="btn btn-success" onclick="generateGraph()">Generate Graph</button>
</div>

</div>

<!-- Chart -->
<canvas id="myChart"></canvas>

<br>

<!-- Search -->
<input class="form-control mb-2" id="search" placeholder="Search..." onkeyup="searchTable()">

<!-- Table -->
<table class="table table-bordered" id="table">
<thead>
<tr></tr>
</thead>
<tbody></tbody>
</table>

<button class="btn btn-success" onclick="downloadReport()">Download Excel</button>

</div>

<script>

// UPLOAD
document.getElementById("uploadForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  let formData = new FormData(e.target);

  await fetch("/upload", {
    method:"POST",
    body:formData
  });

  alert("Uploaded ✅");

  loadData();
  loadFields();
});


// LOAD DATA
async function loadData(){

  let res = await fetch("/data");
  let data = await res.json();

  let table = document.querySelector("#table tbody");
  let thead = document.querySelector("#table thead tr");

  thead.innerHTML="";
  table.innerHTML="";

  if(!data.length) return;

  let keys = Object.keys(data[0]);

  keys.forEach(k=>{
    thead.innerHTML += `<th>${k}</th>`;
  });

  data.forEach(item => {

    let row = table.insertRow();

    keys.forEach(k=>{
      row.insertCell().innerText = item[k];
    });

  });
}


// LOAD FIELDS
async function loadFields(){

  let res = await fetch("/analyze");
  let data = await res.json();

  let x = document.getElementById("xField");
  let y = document.getElementById("yField");

  x.innerHTML="";
  y.innerHTML="";

  data.categorical.forEach(f=>{
    x.innerHTML += `<option>${f}</option>`;
  });

  data.numeric.forEach(f=>{
    y.innerHTML += `<option>${f}</option>`;
  });

}


// GRAPH
function generateGraph(){

  let xField = document.getElementById("xField").value;
  let yField = document.getElementById("yField").value;

  fetch(`/dynamic-graph?xField=${xField}&yField=${yField}`)
  .then(res => res.json())
  .then(data => {

    let labels = data.map(i => i._id);
    let values = data.map(i => i.total);

    new Chart(document.getElementById("myChart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Analysis",
          data: values
        }]
      }
    });

  });

}


// SEARCH
function searchTable(){

  let input = document.getElementById("search").value.toLowerCase();

  let rows = document.querySelectorAll("#table tbody tr");

  rows.forEach(row => {

    if(row.innerText.toLowerCase().includes(input)){
      row.style.display="";
    } else {
      row.style.display="none";
    }

  });

}


// DOWNLOAD
function downloadReport(){
  window.location.href="/download-report";
}


// INIT
loadData();
loadFields();

</script>

</body>

</html>
